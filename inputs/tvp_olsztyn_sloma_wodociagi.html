    "text_paragraph_standard" : [
                        {
                "supertitle" : null,
                "text" : "- Ju\u017c si\u0119 nie wyrabiam. Prosi\u0142em prezydenta, by da\u0142 mi mo\u017cliwo\u015b\u0107 wskazania lub wytypowa\u0142 osob\u0119 do zarz\u0105du, bo jestem w nim sam. Doczeka\u0142em si\u0119 - wyja\u015bnia Wies\u0142aw Pancer.\n<br><br>\nPrezydent w ko\u0144cu stworzy\u0142 nowe stanowisko wiceprezesa, a kandydata wybra\u0142 sam. To Jaros\u0142aw S\u0142oma - ostatnio zast\u0119pca Piotra Grzymowicza odpowiedzialny g\u0142\u00f3wnie za o\u015bwiat\u0119, dzia\u0142acz PO w regionie, a po ostatnich wyborach samorz\u0105dowych r\u00f3wnie\u017c radny wojew\u00f3dzki. \n<br><br>\nW komunikacie PWiK czytamy: \u201ewszystko po to, by unikn\u0105\u0107 w przysz\u0142o\u015bci przerwy w ci\u0105g\u0142o\u015bci zarz\u0105dzania np. po odej\u015bciu obecnego Prezesa na emerytur\u0119.\"\n<br><br>\nNowy wiceprezes wodoci\u0105g\u00f3w z wykszta\u0142cenia jest historykiem. Do\u015bwiadczenie w samorz\u0105dzie i dodatkowa wiedza z funkcjonowania sp\u00f3\u0142ek prawa handlowego oraz integracji europejskiej maj\u0105 wystarczy\u0107.\n<br><br>\n- Mamy osob\u0119, tworzymy dla niej stanowisko wiceprezesa, przez jaki\u015b czas b\u0119dzie si\u0119 przyucza\u0107 przy prezesie. W tym czasie pozna materi\u0119, z kt\u00f3r\u0105 ma do czynienia i b\u0119dzie w stanie ubiega\u0107 si\u0119, mam nadziej\u0119 w konkursie, bo nie widz\u0119 innego rozwi\u0105zania, o stanowisko prezesa - m\u00f3wi radny PiS, Rados\u0142aw Nojman. \n<br><br>\nW kontek\u015bcie zachowania ci\u0105g\u0142o\u015bci i ewentualnej emerytury prezesa, pojawiaj\u0105 si\u0119 g\u0142osy, \u017ce Jaros\u0142aw S\u0142oma m\u00f3g\u0142by zast\u0105pi\u0107 zwierzchnika. Na razie, jak czytamy w komunikacie PwiK, nowy wiceprezes \"poznaje specyfik\u0119, kadr\u0119 zarz\u0105dzaj\u0105c\u0105 i zakres dzia\u0142ania Sp\u00f3\u0142ki\".",
